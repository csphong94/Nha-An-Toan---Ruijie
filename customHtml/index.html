<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Đang xử lý kết nối...</title>
    <meta name="viewport" content="initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta http-equiv="Cache" content="no-cache" />
    <link rel="icon" href="./img/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="./css/index.css" />
  </head>
  <body style="background-color: #111827; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
    <p id="statusMsg">Đang chuẩn bị hệ thống mạng an toàn...</p>
    <script type="text/javascript">
      function getParam(name) {
        var match = RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
        return match && decodeURIComponent(match[1].replace(/\+/g, ' '));
      }

      window.onload = function() {
        try {
          var voucherCode = getParam('voucher');
          var sessionId = getParam('sessionId');
          
          if (voucherCode && sessionId) {
            document.getElementById('statusMsg').innerText = "Đang cấp phát băng thông 5Mbps...";
            var paramObj = {
              lang: 'vi',
              authType: 'voucher',
              sessionId: sessionId,
              account: voucherCode
            };
            
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/api/auth/general", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function () {
              if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                  var res = JSON.parse(xhr.responseText);
                  if (res && res.success && res.result && res.result.logonUrl) {
                    document.getElementById('statusMsg').innerText = "Thành công! Đang vào mạng...";
                    window.location.replace(res.result.logonUrl);
                  } else {
                    document.getElementById('statusMsg').innerText = "Lỗi cấp mạng: " + (res ? res.message : "Không xác định");
                  }
                } else {
                  document.getElementById('statusMsg').innerText = "Lỗi kết nối đến Ruijie: " + xhr.status;
                }
              }
            };
            xhr.onerror = function() {
               document.getElementById('statusMsg').innerText = "Lỗi mạng khi gọi Ruijie API";
            };
            xhr.send(JSON.stringify(paramObj));
          } else {
            var currentHref = window.location.href.split('#')[0];
            var returnUrl = encodeURIComponent(currentHref);
            var searchParams = window.location.search;
            var separator = searchParams ? "&" : "?";
            window.location.replace("https://nha-an-toan-ruijie.onrender.com/" + searchParams + separator + "return_url=" + returnUrl);
          }
        } catch (e) {
          document.getElementById('statusMsg').innerText = "Lỗi Javascript: " + e.message;
        }
      };
    </script>
  </body>
</html>
